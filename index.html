<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mohamed Ayman Contributions</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f1eb;
      --surface:   #fffef9;
      --border:    #e4dfd5;
      --ink:       #1a1714;
      --ink-light: #6b6560;
      --accent:    #d4651a;
      --accent-bg: #fdf0e8;
      --shadow:    0 2px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.05);
      --shadow-hover: 0 8px 28px rgba(0,0,0,.11), 0 2px 6px rgba(0,0,0,.07);
      --radius:    16px;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    header {
      padding: 64px 24px 48px;
      max-width: 860px;
      margin: 0 auto;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.02em;
      color: var(--ink);
    }

    h1 span {
      color: var(--accent);
    }

    .header-rule {
      margin-top: 32px;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* ── Section ── */
    .section {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .section-count {
      font-size: .8rem;
      color: var(--ink-light);
      background: var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      font-weight: 500;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow .2s ease, transform .2s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .card-org {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-bg);
      border-radius: 6px;
      padding: 4px 10px;
      width: fit-content;
    }

    .card-org svg { flex-shrink: 0; }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      color: var(--ink);
    }

    .card-date {
      font-size: .78rem;
      color: var(--ink-light);
      font-weight: 300;
      letter-spacing: .01em;
    }

    .card-desc {
      font-size: .85rem;
      color: var(--ink-light);
      line-height: 1.6;
      font-weight: 300;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .78rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: .01em;
      transition: opacity .15s ease;
    }

    .card-link:hover { opacity: .7; }

    /* ── Like button ── */
    .like-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 7px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem;
      font-weight: 500;
      color: var(--ink-light);
      cursor: pointer;
      transition: all .18s ease;
      user-select: none;
    }

    .like-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }

    .like-btn.liked {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }

    .like-btn svg {
      transition: transform .18s cubic-bezier(.34,1.56,.64,1);
    }

    .like-btn:active svg {
      transform: scale(1.35);
    }

    .like-btn.pop svg {
      animation: pop .3s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.45); }
      100% { transform: scale(1); }
    }

    /* ── Social bar ── */
    .social-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 7px 14px 7px 10px;
      background: var(--surface);
      font-size: .78rem;
      font-weight: 500;
      color: var(--ink);
      transition: border-color .18s, box-shadow .18s, transform .18s, color .18s;
      white-space: nowrap;
    }

    .social-link:hover {
      border-color: var(--social-color, var(--accent));
      color: var(--social-color, var(--accent));
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }

    .social-link:hover .social-icon {
      background: var(--social-color, var(--accent));
    }

    .social-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--border);
      flex-shrink: 0;
      transition: background .18s;
    }

    .social-icon svg { display: block; }

    /* ── "New" badge ── */
    .new-badge {
      display: inline-block;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #fff;
      background: var(--accent);
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Footer ── */
    footer {
      margin-top: 64px;
      text-align: center;
      font-size: .75rem;
      color: var(--ink-light);
      letter-spacing: .04em;
    }
  </style>
</head>

    // ── Determine which IDs are "new" (most recent month in the array) ──
    const NEWEST_ID_COUNT = 4; // how many from the end to badge as "New"

    const STORAGE_KEY = "ma_contributions_likes";

    function loadLikes() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveLikes(likes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(likes));
    }

    function heartIcon(filled) {
      return `<svg width="14" height="14" viewBox="0 0 24 24" fill="${filled ? 'currentColor' : 'none'}"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>`;
    }

    function orgIcon() {
      return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
      </svg>`;
    }

    function linkIcon() {
      return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
      </svg>`;
    }

    function renderCards() {
      const likes = loadLikes();
      const grid = document.getElementById("cards-grid");
      document.getElementById("count-badge").textContent = contributions.length;
      grid.innerHTML = "";

      // ── Reverse a shallow copy so newest (last in array) appears first ──
      const newIds = new Set(contributions.slice(-NEWEST_ID_COUNT).map(c => c.id));
      const sorted = [...contributions].reverse();

      sorted.forEach(c => {
        const count = likes[c.id] || 0;
        const liked = count > 0;
        const isNew = newIds.has(c.id);

        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="card-org">${orgIcon()} ${c.org}</div>
          <div class="card-title">${c.title}${isNew ? '<span class="new-badge">New</span>' : ''}</div>
          <div class="card-date">${c.date}</div>
          <div class="card-desc">${c.desc}</div>
          <div class="card-footer">
            <a class="card-link" href="${c.link}" target="_blank" rel="noopener noreferrer">
              View patch ${linkIcon()}
            </a>
            <button class="like-btn${liked ? ' liked' : ''}" data-id="${c.id}" aria-label="Like this contribution">
              ${heartIcon(liked)}
              <span class="like-count">${count}</span>
            </button>
          </div>
        `;
        grid.appendChild(card);
      });

      // Attach events
      grid.querySelectorAll(".like-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.id;
          const likes = loadLikes();
          likes[id] = (likes[id] || 0) + 1;
          saveLikes(likes);

          const count = likes[id];
          btn.classList.add("liked");
          btn.innerHTML = `${heartIcon(true)}<span class="like-count">${count}</span>`;
          btn.classList.add("pop");
          btn.dataset.id = id;
          btn.addEventListener("animationend", () => btn.classList.remove("pop"), { once: true });
        });
      });
    }

    renderCards();
  </script>
